# Cocxy Terminal - Agent Detection Configuration
#
# Reference snapshot for docs/manual installs.
# Runtime defaults are generated from AgentConfigService.defaultAgentConfigs().
# AgentConfigDefaultsParitySwiftTests keeps this file in sync with those defaults.
#
# Each section defines an AI agent that Cocxy can detect in terminal output.
# Patterns use regular expressions (NSRegularExpression syntax).
#
# To add a custom agent, create a new section:
#
# [my-agent]
# display-name = "My Agent"
# osc-supported = false
# launch-patterns = ["^my-agent\\b"]
# waiting-patterns = ["^>\\s*$"]
# error-patterns = ["Error:"]
# finished-indicators = ["^\\$\\s*$"]
# idle-timeout-override = 10  # optional, in seconds

[claude]
display-name = "Claude Code"
osc-supported = true
# launch-patterns mix two strategies:
#  - Direct command (^claude, ^claude-code, npx claude) → matches when
#    the user types the binary name in the shell.
#  - Banner copy ("Claude Code v[0-9]", "Claude (Max|Pro)") → matches the
#    real banner emitted by claude-code v2.x on launch. The banner does
#    NOT begin with the literal "claude", so the direct patterns alone
#    miss it. Both banner patterns are highly Claude-specific to avoid
#    false positives from other agents that might mention "Claude" in
#    unrelated output.
launch-patterns = ["^claude\\b", "^claude-code\\b", "npx claude", "Claude Code v[0-9]", "Claude (Max|Pro)"]
waiting-patterns = ["^\\? ", "\\(Y/n\\)", "\\(y/N\\)", "Do you want to", "Would you like"]
error-patterns = ["^Error:", "^error\\[", "APIError", "Rate limit"]
finished-indicators = ["^\\$\\s*$", "^❯\\s*$", "^>\\s*$"]

[codex]
display-name = "Codex CLI"
osc-supported = false
launch-patterns = ["^codex\\b", "OpenAI Codex", "Welcome to Codex", "OpenAI's command-line coding agent"]
waiting-patterns = ["Enter to confirm", "\\? ", "ctrl \\+ c again to quit"]
error-patterns = ["Error:", "Failed", "rate limit"]
finished-indicators = ["^\\$\\s*$", "^❯\\s*$", "^>\\s*$"]
idle-timeout-override = 8

[aider]
display-name = "Aider"
osc-supported = false
launch-patterns = ["^aider(?:\\s|$)", "^python.*aider", "Aider v\\d+\\.\\d+", "Main model:.*edit format"]
waiting-patterns = ["^(diff|whole|udiff|architect|ask|help)?( multi)?> $", "^aider>", "^> $"]
error-patterns = ["Error:", "Exception:", "Traceback", "has hit a token limit", "did not conform to the edit format", "Retrying in \\d+ seconds"]
finished-indicators = ["^\\$\\s*$", "^❯\\s*$", "Tokens:.*sent.*received", "Applied edit to"]
idle-timeout-override = 10

[gemini-cli]
display-name = "Gemini CLI"
osc-supported = false
launch-patterns = ["^gemini\\b", "Gemini CLI v\\d+", "Gemini CLI v[0-9]"]
waiting-patterns = ["^> $", "^! $", "Waiting for user confirmation"]
error-patterns = ["Error:", "Failed"]
finished-indicators = ["^\\$\\s*$", "^❯\\s*$", "^> $"]
idle-timeout-override = 8

[kiro]
display-name = "Kiro"
osc-supported = false
launch-patterns = ["^kiro\\b", "^kiro-cli\\b", "Welcome to Kiro"]
waiting-patterns = ["^(\\[.*\\]\\s+)?(\\d+%\\s+)?!?> $", "Thinking\\.\\.\\.", "\\? "]
error-patterns = ["Error:", "rate limit reached", "having trouble responding"]
finished-indicators = ["^\\$\\s*$", "^❯\\s*$", "^> $"]
idle-timeout-override = 8

[opencode]
display-name = "OpenCode"
osc-supported = false
launch-patterns = ["^opencode\\b", "Loading plugins"]
waiting-patterns = ["Ask anything", "^> $"]
error-patterns = ["Error:", "✗"]
finished-indicators = ["^\\$\\s*$", "^❯\\s*$", "✓"]
idle-timeout-override = 8

[cursor]
display-name = "Cursor Agent"
osc-supported = false
launch-patterns = ["^cursor(?:\\s|$)", "Cursor Agent", "Cursor v\\d+"]
waiting-patterns = ["^> $", "\\? ", "Accept\\?"]
error-patterns = ["Error:", "Failed", "rate limit"]
finished-indicators = ["^\\$\\s*$", "^❯\\s*$", "^> $"]
idle-timeout-override = 8

[windsurf]
display-name = "Windsurf"
osc-supported = false
launch-patterns = ["^windsurf(?:\\s|$)", "^cascade(?:\\s|$)", "Cascade v\\d+", "Windsurf v\\d+"]
waiting-patterns = ["^> $", "Cascade>", "\\? "]
error-patterns = ["Error:", "Failed", "rate limit"]
finished-indicators = ["^\\$\\s*$", "^❯\\s*$", "^> $"]
idle-timeout-override = 8
