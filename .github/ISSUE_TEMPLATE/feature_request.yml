name: Feature Request
description: Suggest a feature for Cocxy Terminal
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: "What problem does this solve?"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: "How would you like this to work?"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: "Any other approaches you thought about?"
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Terminal
        - Agent Detection
        - Remote Workspaces
        - Browser
        - CLI
        - UI / Design
        - Configuration
        - Other
    validations:
      required: true
