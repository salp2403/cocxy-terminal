name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build, Sign & Release
    runs-on: macos-15
    timeout-minutes: 60
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Cache libghostty
        id: cache-ghostty
        uses: actions/cache@v4
        with:
          path: |
            libs/GhosttyKit.xcframework
            libs/ghostty-resources
          key: ghostty-universal-${{ runner.os }}-${{ hashFiles('scripts/build-libghostty.sh') }}

      - name: Install build dependencies
        if: steps.cache-ghostty.outputs.cache-hit != 'true'
        run: |
          brew install zig gettext

      - name: Build libghostty
        if: steps.cache-ghostty.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/build-libghostty.sh
          ./scripts/build-libghostty.sh --universal

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          rm $RUNNER_TEMP/certificate.p12

      - name: Build release binary (universal)
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Build CLI companion
        run: swift build --target cocxy -c release --arch arm64 --arch x86_64 || true

      - name: Create app bundle
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          APP_DIR="build/Cocxy Terminal.app"
          CONTENTS_DIR="$APP_DIR/Contents"
          MACOS_DIR="$CONTENTS_DIR/MacOS"
          RESOURCES_DIR="$CONTENTS_DIR/Resources"

          FRAMEWORKS_DIR="$CONTENTS_DIR/Frameworks"
          mkdir -p "$MACOS_DIR" "$RESOURCES_DIR" "$FRAMEWORKS_DIR"

          # Copy universal binary
          cp ".build/apple/Products/Release/CocxyTerminal" "$MACOS_DIR/Cocxy Terminal"

          # Copy Sparkle.framework into bundle
          SPARKLE_FW=$(find .build/artifacts -name "Sparkle.framework" -path "*/macos-*" -type d | head -1)
          if [ -n "$SPARKLE_FW" ]; then
            cp -R "$SPARKLE_FW" "$FRAMEWORKS_DIR/"
            echo "Sparkle.framework copied to bundle"
          else
            SPARKLE_FW=$(find .build -name "Sparkle.framework" -type d | head -1)
            if [ -n "$SPARKLE_FW" ]; then
              cp -R "$SPARKLE_FW" "$FRAMEWORKS_DIR/"
              echo "Sparkle.framework copied from build dir"
            fi
          fi

          # Set rpath so binary finds Sparkle.framework
          install_name_tool -add_rpath @executable_path/../Frameworks "$MACOS_DIR/Cocxy Terminal" 2>/dev/null || true

          # Copy CLI companion if built
          if [ -f ".build/apple/Products/Release/cocxy" ]; then
            cp ".build/apple/Products/Release/cocxy" "$RESOURCES_DIR/cocxy"
          fi

          # Generate Info.plist
          cat > "$CONTENTS_DIR/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Cocxy Terminal</string>
            <key>CFBundleDisplayName</key><string>Cocxy Terminal</string>
            <key>CFBundleIdentifier</key><string>dev.cocxy.terminal</string>
            <key>CFBundleVersion</key><string>$VERSION</string>
            <key>CFBundleShortVersionString</key><string>$VERSION</string>
            <key>CFBundleExecutable</key><string>Cocxy Terminal</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSApplicationCategoryType</key><string>public.app-category.developer-tools</string>
            <key>NSAppTransportSecurity</key>
            <dict>
              <key>NSAllowsLocalNetworking</key><true/>
            </dict>
            <key>SUFeedURL</key>
            <string>https://cocxy.dev/appcast.xml</string>
            <key>SUPublicEDKey</key>
            <string>${{ secrets.SPARKLE_PUBLIC_KEY }}</string>
            <key>NSAppleScriptEnabled</key>
            <true/>
            <key>OSAScriptingDefinition</key>
            <string>CocxyTerminal.sdef</string>
          </dict>
          </plist>
          PLIST

          # Copy resources
          [ -d Resources/Themes ] && cp -R Resources/Themes "$RESOURCES_DIR/" || true
          [ -f Resources/AppIcon.png ] && cp Resources/AppIcon.png "$RESOURCES_DIR/" || true
          [ -d libs/ghostty-resources/shell-integration ] && \
            cp -R libs/ghostty-resources/shell-integration "$RESOURCES_DIR/" || true
          [ -f Resources/CocxyTerminal.sdef ] && \
            cp Resources/CocxyTerminal.sdef "$RESOURCES_DIR/" || true

      - name: Code sign with Developer ID
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          APP_DIR="build/Cocxy Terminal.app"
          ENTITLEMENTS="Resources/CocxyTerminal.entitlements"

          # Sign Sparkle.framework (deepest components first, then framework)
          SPARKLE_DIR="$APP_DIR/Contents/Frameworks/Sparkle.framework"
          if [ -d "$SPARKLE_DIR" ]; then
            # Sign all XPC services
            find "$SPARKLE_DIR" -name "*.xpc" -type d | while read xpc; do
              codesign --force --options runtime --timestamp \
                --sign "$SIGNING_IDENTITY" "$xpc"
            done

            # Sign Autoupdate binary
            [ -f "$SPARKLE_DIR/Versions/B/Autoupdate" ] && \
              codesign --force --options runtime --timestamp \
                --sign "$SIGNING_IDENTITY" "$SPARKLE_DIR/Versions/B/Autoupdate"

            # Sign Updater.app
            [ -d "$SPARKLE_DIR/Versions/B/Updater.app" ] && \
              codesign --force --options runtime --timestamp \
                --sign "$SIGNING_IDENTITY" "$SPARKLE_DIR/Versions/B/Updater.app"

            # Sign the framework itself
            codesign --force --options runtime --timestamp \
              --sign "$SIGNING_IDENTITY" "$SPARKLE_DIR"

            echo "Sparkle.framework fully signed"
          fi

          # Sign CLI companion
          [ -f "$APP_DIR/Contents/Resources/cocxy" ] && \
            codesign --force --options runtime --timestamp \
              --entitlements "$ENTITLEMENTS" \
              --sign "$SIGNING_IDENTITY" \
              "$APP_DIR/Contents/Resources/cocxy" || true

          # Sign main app
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            --sign "$SIGNING_IDENTITY" \
            "$APP_DIR"

          codesign --verify --deep --strict "$APP_DIR"
          echo "Code signing verified."

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p build/dmg-staging
          cp -R "build/Cocxy Terminal.app" build/dmg-staging/
          ln -s /Applications build/dmg-staging/Applications
          hdiutil create -volname "Cocxy Terminal" \
            -srcfolder build/dmg-staging \
            -ov -format UDZO \
            "build/CocxyTerminal-${VERSION}.dmg"

      - name: Sign DMG
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          codesign --force --timestamp \
            --sign "$SIGNING_IDENTITY" \
            "build/CocxyTerminal-${VERSION}.dmg"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG="build/CocxyTerminal-${VERSION}.dmg"

          SUBMISSION=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait --timeout 600 2>&1) || true

          echo "$SUBMISSION"

          # Extract submission ID and get detailed log
          SUB_ID=$(echo "$SUBMISSION" | grep "id:" | head -1 | awk '{print $2}')
          if [ -n "$SUB_ID" ]; then
            echo "=== Notarization Log ==="
            xcrun notarytool log "$SUB_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" 2>&1 || true
          fi

          # Staple if successful
          if echo "$SUBMISSION" | grep -q "status: Accepted"; then
            xcrun stapler staple "$DMG"
            echo "Notarization and stapling complete."
          else
            echo "WARNING: Notarization not accepted. DMG will still work but may show Gatekeeper warning on first launch."
          fi

      - name: Generate Sparkle signature and appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG="build/CocxyTerminal-${VERSION}.dmg"
          DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          DMG_SIZE=$(stat -f%z "$DMG")
          DMG_URL="https://github.com/salp2403/cocxy-terminal/releases/download/v${VERSION}/CocxyTerminal-${VERSION}.dmg"

          # Sign DMG with Sparkle's EdDSA key via stdin (no temp file on disk)
          SPARKLE_BIN=$(find .build -name "sign_update" -type f 2>/dev/null | head -1)

          if [ -z "$SPARKLE_BIN" ] || [ ! -f "$SPARKLE_BIN" ]; then
            echo "ERROR: sign_update not found. Cannot generate Sparkle signature."
            exit 1
          fi

          SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | "$SPARKLE_BIN" -p "$DMG" --ed-key-file -)

          if [ -z "$SIGNATURE" ]; then
            echo "ERROR: Failed to generate Sparkle EdDSA signature."
            exit 1
          fi

          echo "Sparkle EdDSA signature generated (${#SIGNATURE} chars)"

          # Generate appcast.xml
          cat > build/appcast.xml << APPCAST
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Cocxy Terminal</title>
              <link>https://cocxy.dev/appcast.xml</link>
              <description>Updates for Cocxy Terminal</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${DATE}</pubDate>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="${DMG_URL}"
                  sparkle:version="${VERSION}"
                  sparkle:shortVersionString="${VERSION}"
                  sparkle:edSignature="${SIGNATURE}"
                  length="${DMG_SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/CocxyTerminal-*.dmg
          body: |
            ## Cocxy Terminal v${{ steps.version.outputs.VERSION }}

            ### Install
            **Direct download:** Download the DMG below.
            **Homebrew:** `brew tap salp2403/tap && brew install --cask cocxy`

            ### System Requirements
            - macOS 14.0 (Sonoma) or later
            - Apple Silicon or Intel Mac
          generate_release_notes: true

      - name: Update CHANGELOG.md
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DATE=$(date -u +"%Y-%m-%d")

          # Get commit messages between previous tag and current tag.
          # This is more reliable than the release body because we push
          # directly to main (no PRs), so generate_release_notes only
          # produces a "Full Changelog" link without individual entries.
          git fetch --tags --force
          PREV_TAG=$(git describe --tags --abbrev=0 "v${VERSION}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RELEASE_NOTES=$(git log "${PREV_TAG}...v${VERSION}" --pretty=format:"- %s" --no-merges)
          else
            RELEASE_NOTES=$(git log "v${VERSION}" --pretty=format:"- %s" --no-merges -20)
          fi

          # Build the changelog entry from release notes.
          # Variables are passed via environment because the heredoc is
          # single-quoted (required to protect Python's { } and $ in f-strings).
          export CL_VERSION="$VERSION"
          export CL_DATE="$DATE"
          export CL_NOTES="$RELEASE_NOTES"

          python3 << 'PYEOF'
          import os, re, pathlib

          version = os.environ.get("CL_VERSION", "")
          date = os.environ.get("CL_DATE", "")
          notes_raw = os.environ.get("CL_NOTES", "")

          changelog_path = pathlib.Path("CHANGELOG.md")
          if not changelog_path.exists():
              print("CHANGELOG.md not found, skipping")
              raise SystemExit(0)

          content = changelog_path.read_text()

          # Guard: skip if this version already has an entry.
          if f"## [{version}]" in content:
              print(f"Version {version} already in CHANGELOG, skipping")
              raise SystemExit(0)

          # Filter patterns to skip non-changelog content.
          # Kept for safety in case commit messages accidentally contain
          # template-like text (unlikely with conventional commits).
          skip_patterns = [
              "cocxy terminal v",       # Release title
              "direct download",        # Install template
              "download the dmg",       # Install template
              "brew tap",               # Install template
              "brew install",           # Install template
              "macos 14",              # System requirements
              "apple silicon",          # System requirements
              "intel mac",              # System requirements
              "system requirements",    # Section header
              "full changelog",         # GitHub auto-generated footer link
              "install",                # "### Install" header
              "what's changed",         # GitHub auto-generated header
              "new contributors",       # GitHub auto-generated
              "**full changelog**",     # GitHub auto-generated
          ]

          # Parse release notes into Keep a Changelog sections
          added, changed, fixed, security = [], [], [], []

          for line in notes_raw.split("\n"):
              line = line.strip()
              if not line or line.startswith("#"):
                  continue
              clean = re.sub(r"^[\*\-]\s*", "", line)
              if not clean:
                  continue

              # Skip installation template and boilerplate lines.
              lower_check = clean.lower()
              if any(p in lower_check for p in skip_patterns):
                  continue

              # Skip lines that are just URLs (comparison links).
              if clean.startswith("http://") or clean.startswith("https://"):
                  continue

              # Strip conventional commit prefix for cleaner display.
              # "feat: add X" → "Add X", "fix: broken Y" → "Broken Y"
              prefix_match = re.match(r"^(feat|fix|docs|chore|refactor|perf|style|test|ci|build)(\(.+?\))?:\s*", clean)
              prefix_type = prefix_match.group(1) if prefix_match else None
              display = clean[prefix_match.end():] if prefix_match else clean
              if display:
                  display = display[0].upper() + display[1:]

              lower = (prefix_type or display).lower()
              if prefix_type in ("feat",) or any(w in lower for w in ["add", "new", "feat", "support", "introduce"]):
                  added.append(display)
              elif prefix_type in ("fix",) or any(w in lower for w in ["security", "cve", "vulnerab"]):
                  if any(w in display.lower() for w in ["security", "cve", "vulnerab"]):
                      security.append(display)
                  else:
                      fixed.append(display)
              elif prefix_type in ("docs",):
                  changed.append(display)
              elif any(w in lower for w in ["change", "update", "improve", "refactor", "rename"]):
                  changed.append(display)
              else:
                  fixed.append(clean)

          # Build entry
          entry_lines = [f"## [{version}] - {date}", ""]
          if added:
              entry_lines += ["### Added"] + [f"- {x}" for x in added] + [""]
          if changed:
              entry_lines += ["### Changed"] + [f"- {x}" for x in changed] + [""]
          if fixed:
              entry_lines += ["### Fixed"] + [f"- {x}" for x in fixed] + [""]
          if security:
              entry_lines += ["### Security"] + [f"- {x}" for x in security] + [""]

          if not (added or changed or fixed or security):
              entry_lines += [f"- Release v{version}", ""]

          entry = "\n".join(entry_lines)

          # Insert after the header block (first 6 lines), before the first ## version.
          first_version = re.search(r"^## \[", content, re.MULTILINE)
          if first_version:
              insert_pos = first_version.start()
              new_content = content[:insert_pos] + entry + "\n" + content[insert_pos:]
          else:
              new_content = content + "\n" + entry

          # Add reference link for the new version if not present.
          if f"[{version}]:" not in new_content:
              # Find the first reference link line to insert before it.
              ref_match = re.search(r"^\[[\d.]+\]:", new_content, re.MULTILINE)
              if ref_match:
                  prev_versions = re.findall(r"## \[([\d.]+)\]", new_content)
                  prev_ver = prev_versions[1] if len(prev_versions) > 1 else version
                  link = f"[{version}]: https://github.com/salp2403/cocxy-terminal/compare/v{prev_ver}...v{version}\n"
                  new_content = new_content[:ref_match.start()] + link + new_content[ref_match.start():]

          changelog_path.write_text(new_content)
          print(f"CHANGELOG updated with v{version}")

          PYEOF

          # Commit updated CHANGELOG back to main
          git config user.name "said lopez"
          git config user.email "dev@cocxy.dev"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No CHANGELOG changes to commit"
          else
            git commit -m "docs: update CHANGELOG for v${VERSION}"
            git push origin HEAD:main || echo "CHANGELOG push failed (non-blocking)"
          fi

      - name: Deploy website
        env:
          SERVER_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "$SERVER_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          VERSION="${{ steps.version.outputs.VERSION }}"
          DEPLOY_TARGET="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"

          # Deploy appcast.xml
          scp -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            build/appcast.xml ${DEPLOY_TARGET}:${DEPLOY_PATH}

          # Deploy landing page from repo (ensures nav links, content are current)
          scp -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            web/public/index.html ${DEPLOY_TARGET}:${DEPLOY_PATH}index.html

          # Deploy CSS, JS, and image assets
          scp -r -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            web/public/css/ ${DEPLOY_TARGET}:${DEPLOY_PATH}css/
          [ -d web/public/js ] && scp -r -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            web/public/js/ ${DEPLOY_TARGET}:${DEPLOY_PATH}js/ || true
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key ${DEPLOY_TARGET} \
            "mkdir -p ${DEPLOY_PATH}images"
          scp -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            web/public/images/*.png ${DEPLOY_TARGET}:${DEPLOY_PATH}images/

          # Deploy SEO files
          scp -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            web/public/robots.txt ${DEPLOY_TARGET}:${DEPLOY_PATH}robots.txt
          scp -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            web/public/sitemap.xml ${DEPLOY_TARGET}:${DEPLOY_PATH}sitemap.xml

          # Fetch releases with body content for release notes (gh release list lacks body field, use API)
          gh api repos/salp2403/cocxy-terminal/releases?per_page=50 \
            --jq '[.[] | {tagName: .tag_name, publishedAt: .published_at, body: .body}]' \
            > /tmp/releases.json
          echo "${VERSION}" > /tmp/version.txt

          # Generate releases page with notes and pagination
          python3 << 'PYEOF'
          import json, pathlib, re, html

          releases = json.loads(pathlib.Path("/tmp/releases.json").read_text())
          version = pathlib.Path("/tmp/version.txt").read_text().strip()
          PER_PAGE = 5

          def md_to_html(text):
              if not text:
                  return ""
              t = html.escape(text)
              t = re.sub(r"^### (.+)$", r"<h4>\1</h4>", t, flags=re.M)
              t = re.sub(r"^## (.+)$", r"<h3>\1</h3>", t, flags=re.M)
              t = re.sub(r"\*\*(.+?)\*\*", r"<strong>\1</strong>", t)
              t = re.sub(r"`([^`]+)`", r"<code>\1</code>", t)
              t = re.sub(r"^\* (.+)$", r"<li>\1</li>", t, flags=re.M)
              t = re.sub(r"^- (.+)$", r"<li>\1</li>", t, flags=re.M)
              t = t.replace("<li>", "<ul><li>").replace("</li>\n", "</li></ul>\n")
              t = re.sub(r"(</ul>\n<ul>)", "\n", t)
              t = re.sub(r"\n{2,}", "</p><p>", t)
              t = re.sub(r"\n", "<br>", t)
              return t

          cards = []
          for i, r in enumerate(releases):
              tag = r.get("tagName", "")
              ver = tag.lstrip("v")
              date_raw = r.get("publishedAt", "")
              date_str = date_raw[:10] if date_raw else ""
              body = md_to_html(r.get("body", ""))
              badge = ' <span class="rel-badge">Latest</span>' if i == 0 else ""
              hidden = ' style="display:none"' if i >= PER_PAGE else ""
              dmg = f"https://github.com/salp2403/cocxy-terminal/releases/download/{tag}/CocxyTerminal-{ver}.dmg"
              gh = f"https://github.com/salp2403/cocxy-terminal/releases/tag/{tag}"
              notes_html = f'<div class="rel-notes">{body}</div>' if body else ""
              cards.append(f'''
                <article class="rel-card"{hidden}>
                  <div class="rel-header">
                    <h2>{tag}</h2>{badge}
                    <time>{date_str}</time>
                  </div>
                  {notes_html}
                  <div class="rel-actions">
                    <a href="{dmg}" class="btn btn-primary">Download DMG</a>
                    <a href="{gh}" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">Release Notes</a>
                  </div>
                </article>''')

          show_more = ""
          if len(releases) > PER_PAGE:
              hidden_count = len(releases) - PER_PAGE
              show_more = f'''
                <div id="showMore" style="text-align:center;margin:2rem 0;">
                  <button onclick="document.querySelectorAll('.rel-card[style]').forEach(c=>c.style.display='');this.parentElement.style.display='none'" class="btn btn-secondary" style="padding:0.6rem 2rem;">
                    Show {hidden_count} older release{"s" if hidden_count != 1 else ""}
                  </button>
                </div>'''

          page = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Releases - Cocxy Terminal</title>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta name="description" content="Release history and changelog for Cocxy Terminal. Download the latest version.">
            <meta property="og:title" content="Releases - Cocxy Terminal">
            <meta property="og:description" content="Release history and changelog for Cocxy Terminal.">
            <meta property="og:type" content="website">
            <meta property="og:url" content="https://cocxy.dev/releases.html">
            <meta property="og:image" content="https://cocxy.dev/images/og-image.png">
            <meta property="og:image:width" content="1200">
            <meta property="og:image:height" content="630">
            <meta property="og:locale" content="en_US">
            <meta name="twitter:card" content="summary_large_image">
            <meta name="twitter:title" content="Releases - Cocxy Terminal">
            <meta name="twitter:description" content="Release history and changelog for Cocxy Terminal.">
            <meta name="twitter:image" content="https://cocxy.dev/images/og-image.png">
            <link rel="canonical" href="https://cocxy.dev/releases.html">
            <link rel="stylesheet" href="/css/style.css?v={version}">
            <link rel="icon" href="/images/icon.png" type="image/png">
            <link rel="apple-touch-icon" href="/images/icon.png">
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
            <style>
              .rel-card {{background:var(--surface0);border:1px solid var(--surface1);border-radius:12px;padding:2rem;margin-bottom:1.5rem;}}
              .rel-header {{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;}}
              .rel-header h2 {{font-size:1.5rem;font-weight:700;margin:0;}}
              .rel-header time {{color:var(--subtext0);font-size:0.875rem;margin-left:auto;}}
              .rel-badge {{background:var(--lavender);color:var(--crust);padding:0.15rem 0.6rem;border-radius:20px;font-size:0.75rem;font-weight:600;text-transform:uppercase;}}
              .rel-notes {{color:var(--subtext1);font-size:0.9rem;line-height:1.7;margin-bottom:1.25rem;border-left:2px solid var(--surface1);padding-left:1rem;}}
              .rel-notes h3 {{font-size:1.1rem;font-weight:600;color:var(--text);margin:1rem 0 0.5rem;}}
              .rel-notes h4 {{font-size:0.95rem;font-weight:600;color:var(--subtext1);margin:0.75rem 0 0.25rem;}}
              .rel-notes code {{font-family:var(--font-mono);font-size:0.8em;background:var(--crust);padding:0.15em 0.4em;border-radius:4px;color:var(--peach);}}
              .rel-notes ul {{margin:0.5rem 0 0.5rem 1.25rem;}}
              .rel-notes li {{margin-bottom:0.25rem;}}
              .rel-actions {{display:flex;gap:0.75rem;margin-top:1rem;}}
              .rel-actions .btn {{padding:0.5rem 1.2rem;font-size:0.85rem;}}
            </style>
          </head>
          <body>
            <header>
              <nav class="nav" aria-label="Main navigation">
                <a href="/" class="nav-logo"><img src="/images/icon.png" alt="" width="28" height="28"><span>Cocxy</span></a>
                <div class="nav-links">
                  <a href="/#features">Features</a>
                  <a href="/releases.html">Releases</a>
                  <a href="/getting-started.html">Docs</a>
                  <a href="/#download">Download</a>
                  <a href="https://github.com/salp2403/cocxy-terminal" target="_blank" rel="noopener noreferrer">GitHub</a>
                </div>
              </nav>
            </header>
            <main>
              <section class="container" style="padding-top:8rem;padding-bottom:4rem;min-height:80vh;">
                <h1 style="font-size:2.5rem;font-weight:700;margin-bottom:0.5rem;">Releases</h1>
                <p style="color:var(--subtext0);margin-bottom:3rem;">Release history and changelog for Cocxy Terminal.</p>
                {"".join(cards)}
                {show_more}
                <div style="margin-top:3rem;text-align:center;">
                  <h2 style="font-size:1.25rem;margin-bottom:1rem;">Install via Homebrew</h2>
                  <div style="display:inline-block;padding:1rem 2rem;border-radius:8px;background:var(--mantle);border:1px solid var(--surface0);">
                    <code style="color:var(--lavender);font-family:ui-monospace,monospace;font-size:0.9rem;">brew tap salp2403/tap && brew install --cask cocxy</code>
                  </div>
                  <p style="color:var(--subtext0);font-size:0.85rem;margin-top:0.75rem;">Update: <code style="color:var(--lavender);font-family:ui-monospace,monospace;font-size:0.85rem;">brew update &amp;&amp; brew upgrade --cask cocxy</code></p>
                </div>
              </section>
            </main>
            <footer class="site-footer" role="contentinfo">
              <div class="container">
                <div class="footer-content">
                  <div class="footer-brand"><img src="/images/icon.png" alt="" width="24" height="24"><span>Cocxy Terminal</span></div>
                  <div class="footer-links">
                    <a href="https://github.com/salp2403/cocxy-terminal" target="_blank" rel="noopener noreferrer">GitHub</a>
                    <a href="https://github.com/salp2403/cocxy-terminal/blob/main/LICENSE" target="_blank" rel="noopener noreferrer">MIT License</a>
                    <a href="/releases.html">Releases</a>
                  </div>
                  <p class="footer-credit">Made by Said Arturo Lopez</p>
                </div>
              </div>
            </footer>
          </body>
          </html>"""

          pathlib.Path("build/releases.html").write_text(page)
          print(f"Generated releases page with {len(releases)} entries ({PER_PAGE} visible, rest paginated)")
          PYEOF

          # Deploy releases page and getting-started docs
          scp -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            build/releases.html ${DEPLOY_TARGET}:${DEPLOY_PATH}releases.html

          # Deploy getting-started page from repo
          if [ -f web/public/getting-started.html ]; then
            scp -o StrictHostKeyChecking=no -i /tmp/deploy_key \
              web/public/getting-started.html ${DEPLOY_TARGET}:${DEPLOY_PATH}getting-started.html
          fi

          # Update version-specific values on all deployed pages (must run AFTER all SCP operations)
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key ${DEPLOY_TARGET} \
            "sed -i 's|CocxyTerminal-[0-9]*\.[0-9]*\.[0-9]*\.dmg|CocxyTerminal-${VERSION}.dmg|g' ${DEPLOY_PATH}index.html && \
             sed -i 's|>v[0-9]*\.[0-9]*\.[0-9]*<|>v${VERSION}<|g' ${DEPLOY_PATH}index.html && \
             sed -i 's|style.css?v=[0-9]*\.[0-9]*\.[0-9]*|style.css?v=${VERSION}|g' ${DEPLOY_PATH}index.html && \
             sed -i 's|style.css?v=[0-9]*\.[0-9]*\.[0-9]*|style.css?v=${VERSION}|g' ${DEPLOY_PATH}getting-started.html && \
             sed -i 's|\"softwareVersion\": \"[0-9]*\.[0-9]*\.[0-9]*\"|\"softwareVersion\": \"${VERSION}\"|g' ${DEPLOY_PATH}index.html"

          rm /tmp/deploy_key
          echo "Website deployed to cocxy.dev"

      - name: Update Homebrew Cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG="build/CocxyTerminal-${VERSION}.dmg"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')

          # Clone tap, update formula, push
          git clone https://x-access-token:${GH_TOKEN}@github.com/salp2403/homebrew-tap.git /tmp/tap
          cd /tmp/tap

          cat > Casks/cocxy.rb << CASK
          cask "cocxy" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/salp2403/cocxy-terminal/releases/download/v#{version}/CocxyTerminal-#{version}.dmg"
            name "Cocxy Terminal"
            desc "Native macOS terminal built for AI agent workflows"
            homepage "https://cocxy.dev"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :sonoma"

            app "Cocxy Terminal.app"

            binary "#{appdir}/Cocxy Terminal.app/Contents/Resources/cocxy"

            zap trash: [
              "~/.config/cocxy",
              "~/Library/Preferences/dev.cocxy.terminal.plist",
              "~/Library/Caches/dev.cocxy.terminal",
            ]
          end
          CASK

          git config user.name "said lopez"
          git config user.email "dev@cocxy.dev"
          git add Casks/cocxy.rb
          git commit -m "Update cocxy to ${VERSION}" || true
          git push || true
          rm -rf /tmp/tap
