name: Performance

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cold-start:
    name: Cold start smoke budget
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout cocxycore for cocxyd-remote build
        uses: actions/checkout@v4
        with:
          repository: salp2403/cocxycore
          path: cocxycore-source
          ref: main

      - name: Install Zig 0.15.2 for cocxyd-remote build
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build app bundle
        env:
          COCXYCORE_DIR: ${{ github.workspace }}/cocxycore-source
        run: ./scripts/build-app.sh debug

      - name: Measure cold start
        run: |
          set -euo pipefail
          mkdir -p build/performance
          chmod +x scripts/bench-cold-start.sh
          scripts/bench-cold-start.sh --app build/CocxyTerminal.app --runs 5 --enforce | tee build/performance/cold-start.json

      - name: Measure memory baseline
        run: |
          set -euo pipefail
          mkdir -p build/performance
          chmod +x scripts/bench-memory-baseline.sh
          scripts/bench-memory-baseline.sh --app build/CocxyTerminal.app --enforce | tee build/performance/memory-baseline.json

      - name: Run performance benchmark suite
        run: |
          set -euo pipefail
          mkdir -p build/performance
          chmod +x scripts/run-performance-benchmarks.sh scripts/run-cocxycore-benchmarks.sh
          scripts/run-performance-benchmarks.sh 2>&1 | tee build/performance/benchmark-suite.log

      - name: Check performance regression baselines
        run: |
          scripts/check-performance-regression.py \
            --baseline scripts/performance-baselines.json \
            --metric-file build/performance/cold-start.json \
            --metric-file build/performance/memory-baseline.json \
            --log-file build/performance/benchmark-suite.log \
            --enforce
