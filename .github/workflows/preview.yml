name: Preview Build

on:
  push:
    tags:
      - 'v*-preview.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Preview version, for example 1.1.0-preview.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-preview:
    name: Build Preview
    runs-on: macos-15
    timeout-minutes: 60
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout cocxycore for cocxyd-remote build
        uses: actions/checkout@v4
        with:
          repository: salp2403/cocxycore
          path: cocxycore-source
          ref: main

      - name: Install Zig 0.15.2 for cocxyd-remote build
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Resolve preview version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          case "$VERSION" in
            *-preview.*) ;;
            *)
              echo "::error::Preview versions must match X.Y.Z-preview.N"
              exit 1
              ;;
          esac
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Preview version: $VERSION"

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          rm $RUNNER_TEMP/certificate.p12

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Create app bundle (preview)
        env:
          COCXYCORE_DIR: ${{ github.workspace }}/cocxycore-source
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          APP_DIR="build/Cocxy Terminal Preview.app"
          ./scripts/build-app.sh release --version "$VERSION" --channel preview
          rm -rf "$APP_DIR"
          mv build/CocxyTerminalPreview.app "$APP_DIR"

          codesign --force --sign - --entitlements Resources/CocxyTerminal.entitlements "$APP_DIR"

      - name: Verify app bundle contents
        run: |
          APP_DIR="build/Cocxy Terminal Preview.app"
          chmod +x scripts/verify-app-bundle.sh
          ./scripts/verify-app-bundle.sh "$APP_DIR"

      - name: Privacy audit
        run: |
          APP_DIR="build/Cocxy Terminal Preview.app"
          chmod +x scripts/run-privacy-audit.sh
          ./scripts/run-privacy-audit.sh --app "$APP_DIR"

      - name: Code sign with Developer ID
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          APP_DIR="build/Cocxy Terminal Preview.app"
          ENTITLEMENTS="Resources/CocxyTerminal.entitlements"

          SPARKLE_DIR="$APP_DIR/Contents/Frameworks/Sparkle.framework"
          if [ -d "$SPARKLE_DIR" ]; then
            find "$SPARKLE_DIR" -name "*.xpc" -type d | while read xpc; do
              codesign --force --options runtime --timestamp \
                --sign "$SIGNING_IDENTITY" "$xpc"
            done
            [ -f "$SPARKLE_DIR/Versions/B/Autoupdate" ] && \
              codesign --force --options runtime --timestamp \
                --sign "$SIGNING_IDENTITY" "$SPARKLE_DIR/Versions/B/Autoupdate"
            [ -d "$SPARKLE_DIR/Versions/B/Updater.app" ] && \
              codesign --force --options runtime --timestamp \
                --sign "$SIGNING_IDENTITY" "$SPARKLE_DIR/Versions/B/Updater.app"
            codesign --force --options runtime --timestamp \
              --sign "$SIGNING_IDENTITY" "$SPARKLE_DIR"
          fi

          [ -f "$APP_DIR/Contents/Resources/cocxy" ] && \
            codesign --force --options runtime --timestamp \
              --entitlements "$ENTITLEMENTS" \
              --sign "$SIGNING_IDENTITY" \
              "$APP_DIR/Contents/Resources/cocxy"

          [ -f "$APP_DIR/Contents/Resources/cocxyd" ] && \
            codesign --force --options runtime --timestamp \
              --sign "$SIGNING_IDENTITY" \
              "$APP_DIR/Contents/Resources/cocxyd"
          [ -d "$APP_DIR/Contents/Library/LaunchServices/cocxyd.app" ] && \
            codesign --force --options runtime --timestamp \
              --sign "$SIGNING_IDENTITY" \
              "$APP_DIR/Contents/Library/LaunchServices/cocxyd.app"

          find "$APP_DIR/Contents/Resources" \
            \( -name "libtree-sitter.dylib" -o -name "parser.dylib" \) \
            -type f -print0 2>/dev/null | \
            while IFS= read -r -d '' dylib; do
              codesign --force --options runtime --timestamp \
                --sign "$SIGNING_IDENTITY" "$dylib"
            done

          [ -d "$APP_DIR/Contents/PlugIns/CocxyQuickLook.appex" ] && \
            codesign --force --options runtime --timestamp \
              --sign "$SIGNING_IDENTITY" \
              "$APP_DIR/Contents/PlugIns/CocxyQuickLook.appex"

          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            --sign "$SIGNING_IDENTITY" \
            "$APP_DIR"

          codesign --verify --deep --strict "$APP_DIR"

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p build/dmg-staging
          cp -R "build/Cocxy Terminal Preview.app" build/dmg-staging/
          ln -s /Applications build/dmg-staging/Applications
          hdiutil create -volname "Cocxy Terminal Preview" \
            -srcfolder build/dmg-staging \
            -ov -format UDZO \
            "build/CocxyTerminal-Preview-${VERSION}.dmg"

      - name: Sign DMG
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          codesign --force --timestamp \
            --sign "$SIGNING_IDENTITY" \
            "build/CocxyTerminal-Preview-${VERSION}.dmg"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG="build/CocxyTerminal-Preview-${VERSION}.dmg"

          set +e
          SUBMISSION=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait --timeout 600 2>&1)
          NOTARY_STATUS=$?
          set -e

          echo "$SUBMISSION"

          SUB_ID=$(echo "$SUBMISSION" | grep "id:" | head -1 | awk '{print $2}')
          if [ -n "$SUB_ID" ]; then
            echo "=== Notarization Log ==="
            xcrun notarytool log "$SUB_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" 2>&1 || true
          fi

          if [ "$NOTARY_STATUS" -ne 0 ]; then
            echo "::error::Notarization command failed. The preview DMG will not be published without a valid notary ticket."
            exit "$NOTARY_STATUS"
          fi

          if ! echo "$SUBMISSION" | grep -q "status: Accepted"; then
            echo "::error::Notarization was not accepted. The preview DMG will not be published without a valid notary ticket."
            exit 1
          fi

          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          echo "Preview notarization complete."

      - name: Generate preview appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="v${VERSION}"
          DMG="build/CocxyTerminal-Preview-${VERSION}.dmg"
          DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          DMG_SIZE=$(stat -f%z "$DMG")
          DMG_URL="https://github.com/salp2403/cocxy-terminal/releases/download/${TAG}/CocxyTerminal-Preview-${VERSION}.dmg"

          SPARKLE_BIN=$(find .build -name "sign_update" -type f 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ] || [ ! -f "$SPARKLE_BIN" ]; then
            echo "ERROR: sign_update not found. Cannot generate Sparkle signature."
            exit 1
          fi

          SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | "$SPARKLE_BIN" -p "$DMG" --ed-key-file -)
          if [ -z "$SIGNATURE" ]; then
            echo "ERROR: Failed to generate Sparkle EdDSA signature."
            exit 1
          fi

          cat > build/appcast-preview.xml << APPCAST
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Cocxy Terminal Preview</title>
              <link>https://cocxy.dev/appcast-preview.xml</link>
              <description>Preview builds for Cocxy Terminal</description>
              <language>en</language>
              <item>
                <title>Preview ${VERSION}</title>
                <pubDate>${DATE}</pubDate>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="${DMG_URL}"
                  sparkle:version="${VERSION}"
                  sparkle:shortVersionString="${VERSION}"
                  sparkle:edSignature="${SIGNATURE}"
                  length="${DMG_SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST

      - name: Create GitHub Release (preview)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Cocxy Terminal Preview ${{ steps.version.outputs.VERSION }}
          files: |
            build/CocxyTerminal-Preview-*.dmg
          prerelease: true
          body: |
            ## Cocxy Terminal Preview ${{ steps.version.outputs.VERSION }}

            Preview builds are signed, notarized, and intended for early validation before stable release.

      - name: Deploy preview appcast
        env:
          SERVER_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        run: |
          echo "$SERVER_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          DEPLOY_TARGET="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
          case "$DEPLOY_PATH" in
            */) ;;
            *) DEPLOY_PATH="${DEPLOY_PATH}/" ;;
          esac

          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key ${DEPLOY_TARGET} \
            "mkdir -p ${DEPLOY_PATH}"
          scp -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            build/appcast-preview.xml ${DEPLOY_TARGET}:${DEPLOY_PATH}

          rm /tmp/deploy_key
          echo "Preview appcast deployed."

      - name: Update Homebrew preview Cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG="build/CocxyTerminal-Preview-${VERSION}.dmg"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')

          git clone https://x-access-token:${GH_TOKEN}@github.com/salp2403/homebrew-tap.git /tmp/tap
          cd /tmp/tap

          cat > Casks/cocxy-preview.rb << CASK
          cask "cocxy-preview" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/salp2403/cocxy-terminal/releases/download/v#{version}/CocxyTerminal-Preview-#{version}.dmg"
            name "Cocxy Terminal Preview"
            desc "Signed early-access builds of the native macOS terminal"
            homepage "https://cocxy.dev/channels.html"

            depends_on macos: ">= :sonoma"

            app "Cocxy Terminal Preview.app"

            binary "#{appdir}/Cocxy Terminal Preview.app/Contents/Resources/cocxy", target: "cocxy-preview"

            zap trash: [
              "~/.config/cocxy/dev.cocxy.terminal.preview",
              "~/Library/Preferences/dev.cocxy.terminal.preview.plist",
              "~/Library/Caches/dev.cocxy.terminal.preview",
            ]
          end
          CASK

          git config user.name "Said Arturo Lopez"
          git config user.email "dev@cocxy.dev"
          git add Casks/cocxy-preview.rb
          if git diff --cached --quiet; then
            echo "::error::Homebrew preview cask did not change for ${VERSION}"
            exit 1
          fi
          git commit -m "Update cocxy-preview to ${VERSION}"
          git push
          rm -rf /tmp/tap
