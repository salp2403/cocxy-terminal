name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build
        run: swift build -c debug

      - name: Test
        run: |
          swift test --skip PerformanceTests --skip CocxyCorePerformanceBenchmarks

      - name: Build Release
        run: swift build -c release
