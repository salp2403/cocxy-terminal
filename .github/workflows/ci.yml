name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build
        run: swift build -c debug

      - name: Test
        env:
          # Swift Testing can over-parallelize AppKit/Dispatch-heavy suites on
          # hosted macOS runners. Keep coverage intact but execute deterministically.
          SWT_EXPERIMENTAL_MAXIMUM_PARALLELIZATION_WIDTH: "1"
        run: |
          set -euo pipefail
          echo "Running XCTest suite..."
          swift test --disable-swift-testing --skip PerformanceTests --skip CocxyCorePerformanceBenchmarks 2>&1 | tee xctest-output.log
          echo "Running Swift Testing suite..."
          swift test --disable-xctest --skip PerformanceTests --skip CocxyCorePerformanceBenchmarks 2>&1 | tee swift-testing-output.log
          echo "All XCTest and Swift Testing tests passed."

      - name: Build Release
        run: swift build -c release

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build App Bundle
        run: |
          chmod +x scripts/build-app.sh
          ./scripts/build-app.sh release

      - name: Verify App Bundle
        run: |
          chmod +x scripts/verify-app-bundle.sh
          ./scripts/verify-app-bundle.sh build/CocxyTerminal.app
