name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build
        run: swift build -c debug

      - name: Test
        run: |
          swift test --skip PerformanceTests 2>&1 | tee test-output.log || true
          if grep -q "Test run with .* tests passed" test-output.log && \
             ! grep -q "with [1-9].* failure" test-output.log; then
            echo "All tests passed."
          else
            echo "Tests failed."
            exit 1
          fi

      - name: Build Release
        run: swift build -c release
