name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build
        run: swift build -c debug

      - name: Test
        run: |
          set +e
          swift test --skip PerformanceTests --skip CocxyCorePerformanceBenchmarks 2>&1 | tee test-output.log
          set -e
          if grep -q "Test run with .* tests passed" test-output.log; then
            echo "All Swift Testing tests passed."
            exit 0
          fi
          echo "Tests failed — see output above."
          exit 1

      - name: Build Release
        run: swift build -c release

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build App Bundle
        run: |
          chmod +x scripts/build-app.sh
          ./scripts/build-app.sh release

      - name: Verify App Bundle
        run: |
          chmod +x scripts/verify-app-bundle.sh
          ./scripts/verify-app-bundle.sh build/CocxyTerminal.app
